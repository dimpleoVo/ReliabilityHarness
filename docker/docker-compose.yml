services:
  reliability-backend:
    build:
      context: ../
      dockerfile: docker/backend.Dockerfile
    container_name: reliability-backend
    env_file:
      - path: ../.env
        required: false
    environment:
      - PYTHONPATH=/app
      - SANDBOX_BASE_URL=http://sandbox:9000
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
      - /var/run/docker.sock:/var/run/docker.sock
      # chroma_db_data: host chroma_db/ at repo root → /app/data/chroma_db_data in container
      # Migration-2B will move host path from chroma_db/ to data/chroma_db_data/
      - ../chroma_db:/app/data/chroma_db_data
    command: uvicorn reliability_harness.runtime.main_api:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - sandbox

  sandbox:
    build:
      context: ../
      dockerfile: docker/sandbox.Dockerfile
    container_name: reliability-sandbox
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
